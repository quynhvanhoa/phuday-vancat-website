backend:
  name: github
  repo: quynhvanhoa/phuday-vancat-website
  branch: main
  base_url: https://phuday-cms-auth.quynhvanhoa.workers.dev
  auth_endpoint: /authorize

locale: vi
site_url: https://quynhvanhoa.github.io/phuday-vancat-website/

media_folder: assets/images/uploads
public_folder: /phuday-vancat-website/assets/images/uploads

collections:
  - name: pages
    label: Các trang cố định
    files:
      - file: content/pages/index.md
        label: Trang chủ
        name: index
        fields:
          - { label: Tiêu đề lớn (Hero H1), name: title, widget: string }
          - { label: Câu phụ dưới tiêu đề (xuống dòng OK), name: hero_subtitle, widget: text }
          - { label: Ảnh nền Hero (banner đầu trang), name: hero_image, widget: image, required: false, hint: "Để trống nếu muốn giữ nền đỏ son mặc định" }
          - { label: Tiêu đề lời chào, name: welcome_title, widget: string }
          - { label: Ảnh cạnh lời chào, name: welcome_image, widget: image, required: false, hint: "Ảnh thủ nhang hoặc cảnh Phủ" }
          - { label: Lời chào (nội dung), name: body, widget: markdown }
          - { label: Người ký tên cuối lời chào, name: welcome_signature, widget: string }
          - { label: "Ảnh thẻ Tour 360° (thay icon 360°)", name: card_tour_image, widget: image, required: false }
          - { label: "Ảnh thẻ Tín ngưỡng thờ Mẫu (thay chữ Hán 慕)", name: card_worship_image, widget: image, required: false }
          - { label: "Ảnh thẻ Lịch tiệc Mẫu (thay chữ Hán 祭)", name: card_feast_image, widget: image, required: false }
          - { label: "Ảnh thẻ Cung tiến công đức (thay icon ♥)", name: card_donate_image, widget: image, required: false }
      - file: content/pages/gioi-thieu.md
        label: Trang Giới thiệu
        name: gioi-thieu
        fields:
          - { label: Tiêu đề trang, name: title, widget: string }
          - { label: Nội dung, name: body, widget: markdown }
      - file: content/pages/tin-nguong-tho-mau.md
        label: Trang Tín ngưỡng thờ Mẫu
        name: tin-nguong-tho-mau
        fields:
          - { label: Tiêu đề trang, name: title, widget: string }
          - { label: Nội dung, name: body, widget: markdown }
      - file: content/pages/le-hoi.md
        label: Trang Lịch tiệc Mẫu
        name: le-hoi
        fields:
          - { label: Tiêu đề trang, name: title, widget: string }
          - { label: Nội dung, name: body, widget: markdown }
      - file: content/pages/tour-360.md
        label: Trang Tour 360°
        name: tour-360
        fields:
          - { label: Tiêu đề trang, name: title, widget: string }
          - { label: Nội dung, name: body, widget: markdown }
      - file: content/pages/lien-he.md
        label: Trang Liên hệ
        name: lien-he
        fields:
          - { label: Tiêu đề trang, name: title, widget: string }
          - { label: Tiêu đề mục đầu trang, name: contact_section_title, widget: string }
          - { label: Câu giới thiệu, name: intro, widget: string }
          - { label: Tiêu đề bản đồ, name: map_title, widget: string }
          - { label: Mô tả bản đồ, name: map_caption, widget: string }
          - { label: Tiêu đề mục cung tiến, name: donate_title, widget: string }
          - { label: Nội dung Cung tiến công đức, name: body, widget: markdown }

  - name: settings
    label: Cài đặt chung
    files:
      - file: content/settings/general.md
        label: Thông tin liên hệ chung
        name: general
        fields:
          - { label: Số điện thoại, name: phone, widget: string }
          - { label: Tên người nhận (vd Thủ nhang Trần Văn Cường), name: phone_label, widget: string }
          - { label: Địa chỉ, name: address, widget: string }
          - { label: Giờ mở cửa, name: open_hours, widget: string }
          - { label: Email (tùy chọn), name: email, widget: string, required: false }
          - { label: Facebook URL, name: facebook, widget: string, required: false }
          - { label: Hiển thị link Facebook (vd facebook.com/Phudayvancatnd), name: facebook_label, widget: string, required: false }
          - { label: "Logo Phủ (ảnh tròn trên menu, để trống dùng mặc định)", name: logo_image, widget: image, required: false, hint: "Ảnh tròn nhỏ hiển thị bên trái menu, cạnh chữ Phủ Dầy Vân Cát. Khuyến nghị ảnh vuông 200x200px" }

  - name: posts
    label: Bài viết
    label_singular: Bài viết
    folder: content/posts
    create: true
    slug: "{{year}}{{month}}{{day}}-{{slug}}"
    summary: "{{title}} ({{date}})"
    fields:
      - label: Tiêu đề
        name: title
        widget: string
      - label: Ngày đăng
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false
        default: ""
      - label: Danh mục
        name: category
        widget: select
        default: su-kien
        options:
          - { label: "Sự kiện", value: su-kien }
          - { label: "Lễ hội", value: le-hoi }
          - { label: "Hoạt động xã hội", value: xa-hoi }
          - { label: "Chuyên đề", value: chuyen-de }
      - label: Tóm tắt
        name: excerpt
        widget: text
        required: false
        hint: "Tóm tắt ngắn hiển thị ở trang danh sách (tùy chọn)"
      - label: Ảnh đại diện
        name: thumbnail
        widget: image
        required: false
        hint: "Ảnh hiển thị đầu bài (tùy chọn)"
      - label: Nội dung bài viết
        name: body
        widget: markdown
