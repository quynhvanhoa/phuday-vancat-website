<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập — Quản trị Phủ Dầy Vân Cát</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="login-wrap">
    <div class="login-box">
        <div class="login-logo">慕</div>
        <h1>Phủ Dầy Vân Cát</h1>
        <p class="subtitle">Khu vực quản trị nội dung</p>

        <form id="login-form">
            <div class="form-group">
                <label for="user">Tài khoản</label>
                <input type="text" id="user" name="user" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="pass">Mật khẩu</label>
                <input type="password" id="pass" name="pass" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary">Đăng nhập</button>
        </form>

        <div class="login-hint">
            <strong>Tài khoản demo:</strong><br>
            Tài khoản: <code>admin</code><br>
            Mật khẩu: <code>phuday2026</code>
        </div>
    </div>
</div>

<script src="assets/js/admin.js"></script>
<script>
    if (Auth.current()) window.location.href = 'dashboard.html';
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        if (Auth.login(user, pass)) {
            window.location.href = 'dashboard.html';
        } else {
            toast('Tài khoản hoặc mật khẩu không đúng', 'error');
        }
    });
</script>
</body>
</html>
